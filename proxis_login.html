<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxis · Acceso a Tutoriales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --lime:    #cbf135;
  --lime-dk: #a8cc1a;
  --black:   #0b0a09;
  --gray-1:  #1a1916;
  --gray-2:  #4a4844;
  --gray-3:  #8a8885;
  --gray-4:  #c8c6c3;
  --gray-5:  #e8e6e3;
  --white:   #ffffff;
  --error:   #e8630a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--black);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Dot grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(203,241,53,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

/* Decorative glow */
.glow {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,204,26,0.08) 0%, transparent 70%);
  top: -150px; right: -150px;
  pointer-events: none;
  z-index: 0;
}
.glow-2 {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,204,26,0.05) 0%, transparent 70%);
  bottom: -120px; left: -100px;
  pointer-events: none;
  z-index: 0;
}

/* Card */
.login-card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 44px 48px;
  width: 100%;
  max-width: 420px;
  backdrop-filter: blur(12px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 36px;
  text-decoration: none;
}

.logo-wordmark {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 22px;
  line-height: 1;
  color: var(--white);
  letter-spacing: -0.04em;
}

.logo-wordmark span { color: var(--lime); }

.logo-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  border-left: 1px solid rgba(255,255,255,0.15);
  padding-left: 10px;
  line-height: 1.4;
}

/* Heading */
.login-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(168,204,26,0.12);
  color: var(--lime-dk);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid rgba(168,204,26,0.25);
  margin-bottom: 16px;
}

.login-title {
  font-size: 24px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 6px;
}

.login-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  line-height: 1.6;
  margin-bottom: 32px;
}

/* Form */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.form-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

.form-input {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  color: var(--white);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-text-fill-color: var(--white);
}

.form-input::placeholder { color: rgba(255,255,255,0.2); }

.form-input:focus {
  border-color: rgba(168,204,26,0.5);
  background: rgba(168,204,26,0.05);
}

.form-input.error { border-color: var(--error); }

/* Password toggle */
.input-wrap {
  position: relative;
}

.toggle-pw {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(255,255,255,0.3);
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color 0.15s;
}
.toggle-pw:hover { color: rgba(255,255,255,0.6); }

/* Error message */
.error-msg {
  display: none;
  align-items: center;
  gap: 8px;
  background: rgba(232,99,10,0.12);
  border: 1px solid rgba(232,99,10,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #f09060;
  margin-bottom: 16px;
}
.error-msg.visible { display: flex; }

/* Submit */
.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--lime);
  color: var(--black);
  border: none;
  border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: -0.01em;
  transition: all 0.15s;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.login-btn:hover {
  background: var(--lime-dk);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(168,204,26,0.3);
}
.login-btn:active { transform: translateY(0); }

/* Redirect overlay */
.redirect-overlay {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 20px 0 8px;
}
.redirect-overlay.visible { display: flex; }

.redirect-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(168,204,26,0.15);
  border: 2px solid rgba(168,204,26,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 14px;
}

.redirect-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 4px;
}

.redirect-role {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--lime-dk);
  margin-bottom: 20px;
}

.redirect-bar-wrap {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 12px;
}

.redirect-bar {
  height: 100%;
  background: var(--lime);
  border-radius: 2px;
  width: 0%;
  transition: width 1.8s linear;
}

.redirect-txt {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
}

/* Footer */
.login-footer {
  position: relative;
  z-index: 1;
  margin-top: 28px;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.04em;
}

.login-footer a {
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: color 0.15s;
}
.login-footer a:hover { color: var(--lime-dk); }
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow-2"></div>

<div class="login-card">

  <!-- Logo -->
  <a href="index.html" class="logo">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="4.5" fill="#a8cc1a"/>
      <circle cx="6" cy="9" r="3" fill="#a8cc1a" opacity="0.85"/>
      <circle cx="26" cy="9" r="3" fill="#a8cc1a" opacity="0.85"/>
      <circle cx="6" cy="23" r="3" fill="#a8cc1a" opacity="0.6"/>
      <circle cx="26" cy="23" r="3" fill="#a8cc1a" opacity="0.6"/>
      <line x1="8.6" y1="10.6" x2="13.2" y2="14.0" stroke="#a8cc1a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="23.4" y1="10.6" x2="18.8" y2="14.0" stroke="#a8cc1a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="8.6" y1="21.4" x2="13.2" y2="18.0" stroke="#a8cc1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="23.4" y1="21.4" x2="18.8" y2="18.0" stroke="#a8cc1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </svg>
    <span class="logo-wordmark">Pro<span>xis</span></span>
    <span class="logo-tag">Prospección<br>en práctica</span>
  </a>

  <!-- Form state -->
  <div id="formState">
    <div class="login-badge">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2"/>
        <path d="M3.5 5l1 1 2-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Acceso seguro
    </div>
    <h1 class="login-title">Bienvenido/a<br>a tu tutorial</h1>
    <p class="login-sub">Ingresa tus credenciales para acceder al recorrido personalizado según tu perfil.</p>

    <div class="error-msg" id="errorMsg">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7 4v3M7 9.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span id="errorTxt">Usuario o contraseña incorrectos.</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <input class="form-input" type="text" id="username" placeholder="Tu nombre completo" autocomplete="off" spellcheck="false">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="password" placeholder="••••••••••" autocomplete="off">
          <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn" title="Mostrar/ocultar">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="login-btn" type="submit">
        Ingresar
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
  </div>

  <!-- Redirect state -->
  <div class="redirect-overlay" id="redirectState">
    <div class="redirect-avatar" id="redirectAvatar">✓</div>
    <div class="redirect-name" id="redirectName"></div>
    <div class="redirect-role" id="redirectRoleLabel"></div>
    <div class="redirect-bar-wrap">
      <div class="redirect-bar" id="redirectBar"></div>
    </div>
    <div class="redirect-txt" id="redirectTxt">Cargando tu tutorial…</div>
  </div>

</div>

<p class="login-footer">
  <a href="index.html">← Volver a Proxis</a>
  &nbsp;·&nbsp; Uso interno del equipo · The Precision Selling
</p>

<script>
/* ─── USERS DB ─────────────────────────────────── */
const USERS = [
  { name: "Diego Pérez",             pass: "diegope2026$",          role: "asesor"     },
  { name: "Nazaret Johannesen",      pass: "nazaretjoha$2026",      role: "asesor"     },
  { name: "Verónica Castillo",       pass: "verocastil2026$",       role: "asesor"     },
  { name: "Fernanda Grothusen",      pass: "fernagroth$2026",       role: "asesor"     },
  { name: "Sindy Martínez",          pass: "SindyMar2026$$",        role: "asesor"     },
  { name: "Francis Arancibia",       pass: "Francis$2026$$",        role: "asesor"     },
  { name: "Marcela Jara",            pass: "MJara$$2026",           role: "asesor"     },
  { name: "María Francisca Lorenz",  pass: "FrancBertoni$2026$",    role: "asesor"     },
  { name: "Oriana Jorquera",         pass: "Ori$Jorq2026",          role: "asesor"     },
  { name: "Mauricio Gana",           pass: "MauGana$2026$$",        role: "asesor"     },
  { name: "Alejandra Espinoza",      pass: "AlejEspinoz$$026$$",    role: "supervisor" },
];

const DEST = {
  asesor:     "tps_tutorial_asesor.html",
  supervisor: "tps_tutorial_supervisor.html",
};

const DEST_PLATAFORMA = "proxis_plataforma.html";

const ROLE_LABEL = {
  asesor:     "Asesor/a · Tutorial de prospección",
  supervisor: "Supervisora · Tutorial de gestión de equipos",
};

const ROLE_LABEL_PLATAFORMA = {
  asesor:     "Asesor/a · Proxis",
  supervisor: "Supervisora · Proxis",
};

const ROLE_EMOJI = {
  asesor:     "🧑‍💼",
  supervisor: "📊",
};

/* ─── HANDLERS ─────────────────────────────────── */

// Detect destination from URL param: ?dest=plataforma or ?dest=tutorial (default)
const urlParams = new URLSearchParams(window.location.search);
const destMode = urlParams.get('dest') === 'plataforma' ? 'plataforma' : 'tutorial';

// Update UI based on destination
document.addEventListener('DOMContentLoaded', function() {
  if (destMode === 'plataforma') {
    document.querySelector('.login-title').innerHTML = 'Accede a<br>Proxis';
    document.querySelector('.login-sub').textContent = 'Ingresa tus credenciales para abrir la plataforma.';
  }
});

function handleLogin(e) {
  e.preventDefault();

  const inputName = document.getElementById('username').value.trim();
  const inputPass = document.getElementById('password').value;
  const errorMsg  = document.getElementById('errorMsg');
  const errorTxt  = document.getElementById('errorTxt');

  // Clear errors
  errorMsg.classList.remove('visible');
  document.getElementById('username').classList.remove('error');
  document.getElementById('password').classList.remove('error');

  if (!inputName || !inputPass) {
    errorTxt.textContent = 'Por favor completa usuario y contraseña.';
    errorMsg.classList.add('visible');
    return;
  }

  // Find user — case-insensitive name match
  const user = USERS.find(u =>
    u.name.toLowerCase() === inputName.toLowerCase() &&
    u.pass === inputPass
  );

  if (!user) {
    errorTxt.textContent = 'Usuario o contraseña incorrectos.';
    errorMsg.classList.add('visible');
    document.getElementById('username').classList.add('error');
    document.getElementById('password').classList.add('error');
    // Shake animation
    document.getElementById('loginForm').style.animation = 'none';
    void document.getElementById('loginForm').offsetWidth;
    document.getElementById('loginForm').style.animation = 'shake 0.35s ease';
    return;
  }

  // Save user to localStorage for tutorials and plataforma to read
  localStorage.setItem('proxis_user', JSON.stringify({ name: user.name, role: user.role }));

  // Success — show redirect state
  document.getElementById('formState').style.display = 'none';
  const rs = document.getElementById('redirectState');
  rs.classList.add('visible');
  document.getElementById('redirectAvatar').textContent = ROLE_EMOJI[user.role];
  document.getElementById('redirectName').textContent   = user.name;

  const label = destMode === 'plataforma'
    ? ROLE_LABEL_PLATAFORMA[user.role]
    : ROLE_LABEL[user.role];
  document.getElementById('redirectRoleLabel').textContent = label;
  document.getElementById('redirectTxt').textContent =
    destMode === 'plataforma' ? 'Cargando Proxis…' : 'Cargando tu tutorial…';

  // Animate bar then redirect
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.getElementById('redirectBar').style.width = '100%';
    });
  });

  const dest = destMode === 'plataforma'
    ? DEST_PLATAFORMA
    : DEST[user.role];

  setTimeout(() => {
    window.location.href = dest;
  }, 2000);
}

function togglePassword() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.innerHTML = `<path d="M2 2l12 12M6.5 6.6A2 2 0 009.4 9.5M4.5 4.7C2.8 5.9 1 8 1 8s2.5 5 7 5c1.4 0 2.6-.4 3.6-.9M7 3.1C7.3 3 7.6 3 8 3c4.5 0 7 5 7 5s-.8 1.5-2 2.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>`;
  } else {
    inp.type = 'password';
    ico.innerHTML = `<path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>`;
  }
}

/* Enter key on username moves to password */
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('password').focus();
  }
});
</script>

<style>
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-8px); }
  40%       { transform: translateX(8px); }
  60%       { transform: translateX(-5px); }
  80%       { transform: translateX(5px); }
}
</style>

</body>
</html>
