<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proxis Admin — Analytics</title>
<script src="_core.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0b0a09;color:#e8e6e3;min-height:100vh}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:16px;padding:20px 32px;border-bottom:1px solid rgba(255,255,255,0.07)}
.hdr-back{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;transition:color .2s}
.hdr-back:hover{color:#cbf135}
.hdr-logo{font-weight:800;font-size:18px;letter-spacing:-0.04em}
.hdr-logo span{color:#cbf135}
.hdr-title{font-size:14px;color:rgba(255,255,255,0.5);margin-left:4px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.hdr-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.05em}
.badge-dev{background:rgba(203,241,53,0.15);color:#cbf135;border:1px solid rgba(203,241,53,0.3)}
.badge-prod{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.btn-refresh{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,0.6);cursor:pointer;transition:all .2s}
.btn-refresh:hover{border-color:rgba(203,241,53,0.4);color:#cbf135}
.btn-refresh.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Page layout ── */
.page{padding:28px 32px 48px;display:flex;flex-direction:column;gap:24px}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:22px 24px}
.kpi-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.kpi-value{font-size:32px;font-weight:800;letter-spacing:-0.04em;line-height:1}
.kpi-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-top:6px}
.kpi-lime{color:#cbf135}
.kpi-green{color:#34d399}
.kpi-red{color:#ef4444}
.kpi-blue{color:#60a5fa}

/* ── Two-col row ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px}
.panel-title{font-size:13px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.panel-title span{font-size:11px;font-weight:400;color:rgba(255,255,255,0.35)}

/* ── Horizontal bar chart ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:rgba(255,255,255,0.6);width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:8px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#cbf135;transition:width .6s ease}
.bar-fill.blue{background:#60a5fa}
.bar-fill.green{background:#34d399}
.bar-fill.orange{background:#f97316}
.bar-count{font-size:12px;color:rgba(255,255,255,0.4);width:28px;text-align:right;flex-shrink:0}

/* ── Activity sparkline ── */
.spark-row{display:flex;align-items:flex-end;gap:4px;height:60px;margin-bottom:8px}
.spark-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.spark-bar{width:100%;border-radius:3px 3px 0 0;background:#cbf135;opacity:.7;transition:height .4s ease;min-height:2px}
.spark-bar:hover{opacity:1}
.spark-day{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}
.spark-empty{font-size:12px;color:rgba(255,255,255,0.25);text-align:center;padding:20px 0}

/* ── Asesor table ── */
.asesor-table{width:100%;border-collapse:collapse}
.asesor-table th{font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:.05em;text-transform:uppercase;padding:0 0 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.07)}
.asesor-table td{font-size:13px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:middle}
.asesor-table tr:last-child td{border-bottom:none}
.perfil-pip{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:10px;font-weight:800}
.pip-d{background:rgba(249,115,22,0.15);color:#f97316}
.pip-r{background:rgba(96,165,250,0.15);color:#60a5fa}
.pip-s{background:rgba(52,211,153,0.15);color:#34d399}
.pip-x{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4)}
.score-pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.score-pos{background:rgba(52,211,153,0.12);color:#34d399}
.score-neg{background:rgba(239,68,68,0.12);color:#ef4444}
.score-neu{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4)}

/* ── Recent log ── */
.log-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;background:#cbf135;margin-top:5px;flex-shrink:0}
.log-dot.err{background:#ef4444}
.log-meta{flex:1;min-width:0}
.log-asesor{font-size:13px;font-weight:600}
.log-trigger{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.log-body{font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{font-size:11px;color:rgba(255,255,255,0.25);flex-shrink:0;margin-top:3px}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:rgba(255,255,255,0.3);font-size:13px;gap:10px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.1);border-top-color:#cbf135;border-radius:50%;animation:spin .7s linear infinite}

/* ── Empty ── */
.empty-panel{text-align:center;padding:32px;color:rgba(255,255,255,0.25);font-size:13px}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-back" onclick="location.href='index.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Panel
  </div>
  <div style="width:1px;height:16px;background:rgba(255,255,255,0.1)"></div>
  <div class="hdr-logo">PROX<span>IS</span></div>
  <div class="hdr-title">/ Analytics</div>
  <div class="hdr-right">
    <button class="btn-refresh" id="btn-refresh" onclick="loadAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Actualizar
    </button>
    <div class="hdr-badge" id="env-badge">—</div>
  </div>
</div>

<!-- Page -->
<div class="page">

  <!-- KPIs -->
  <div class="kpi-row" id="kpi-row">
    <div class="loading" style="grid-column:1/-1"><span class="spin"></span> Cargando métricas…</div>
  </div>

  <!-- Triggers + Actividad -->
  <div class="two-col">
    <div class="panel">
      <div class="panel-title">Mensajes por trigger <span>acumulado</span></div>
      <div id="trigger-bars"><div class="loading"><span class="spin"></span></div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Actividad <span>últimos 14 días</span></div>
      <div id="spark-wrap"><div class="loading"><span class="spin"></span></div></div>
    </div>
  </div>

  <!-- Asesores -->
  <div class="panel">
    <div class="panel-title">Resumen por asesor</div>
    <div id="asesor-wrap"><div class="loading"><span class="spin"></span></div></div>
  </div>

  <!-- Log reciente -->
  <div class="panel">
    <div class="panel-title">Últimos mensajes enviados <span>máx. 10</span></div>
    <div id="log-wrap"><div class="loading"><span class="spin"></span></div></div>
  </div>

</div>

<script>
/* ── Auth ── */
(function(){
  const u = JSON.parse(localStorage.getItem('proxis_user') || 'null');
  if (!u || u.role !== 'admin') location.href = '../proxis_plataforma.html';
})();

/* ── Env badge ── */
document.getElementById('env-badge').textContent = IS_DEV ? 'DEV' : 'PROD';
document.getElementById('env-badge').className = 'hdr-badge ' + (IS_DEV ? 'badge-dev' : 'badge-prod');

/* ── Helpers ── */
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' }) +
         ' ' + d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

function getMes() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

/* ── Load all ── */
async function loadAll() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');

  try {
    const mes = getMes();
    const since14 = daysAgo(14);

    const [logs, logsMonth, feedback, triggers, metas] = await Promise.all([
      SBC.get('message_log', 'order=created_at.desc&limit=200'),
      SBC.get('message_log', `created_at=gte.${mes}-01&order=created_at.desc`),
      SBC.get('feedback',    'select=asesor,score,created_at&order=created_at.desc'),
      SBC.get('trigger_config', 'select=id,nombre,activo'),
      SBC.get('metas', 'select=asesor,perfil_conductual')
    ]);

    renderKPIs(logs, logsMonth, feedback, triggers);
    renderTriggerBars(logs, triggers);
    renderSparkline(logs, since14);
    renderAsesorTable(logs, feedback, metas);
    renderRecentLog(logs.slice(0, 10), triggers);
  } catch(e) {
    document.getElementById('kpi-row').innerHTML =
      `<div style="grid-column:1/-1;color:#ef4444;padding:20px;font-size:13px">Error: ${e.message}</div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

/* ── KPIs ── */
function renderKPIs(logs, logsMonth, feedback, triggers) {
  const total   = logs.length;
  const month   = logsMonth.length;
  const active  = triggers.filter(t => t.activo).length;

  const scores  = feedback.map(f => f.score).filter(s => s != null);
  const avgScore = scores.length
    ? (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1)
    : null;

  const scoreColor = avgScore === null ? '' : avgScore > 0 ? 'kpi-green' : avgScore < 0 ? 'kpi-red' : '';

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total mensajes</div>
      <div class="kpi-value kpi-lime">${total}</div>
      <div class="kpi-sub">desde el inicio</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Este mes</div>
      <div class="kpi-value kpi-blue">${month}</div>
      <div class="kpi-sub">${getMes()}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Feedback promedio</div>
      <div class="kpi-value ${scoreColor}">${avgScore !== null ? avgScore : '—'}</div>
      <div class="kpi-sub">${scores.length} valoraciones</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Triggers activos</div>
      <div class="kpi-value kpi-green">${active}</div>
      <div class="kpi-sub">de ${triggers.length} configurados</div>
    </div>`;
}

/* ── Trigger bars ── */
function renderTriggerBars(logs, triggers) {
  if (!logs.length) {
    document.getElementById('trigger-bars').innerHTML = '<div class="empty-panel">Sin mensajes aún.</div>';
    return;
  }

  const counts = {};
  logs.forEach(l => { counts[l.trigger_id] = (counts[l.trigger_id] || 0) + 1; });

  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const max    = sorted[0]?.[1] || 1;
  const colors = ['','blue','green','orange',''];

  document.getElementById('trigger-bars').innerHTML = sorted.map(([tid, n], i) => {
    const trig  = triggers.find(t => t.id === tid);
    const label = trig?.nombre || tid;
    const pct   = Math.round((n / max) * 100);
    const color = colors[i % colors.length];
    return `
      <div class="bar-row">
        <div class="bar-label" title="${label}">${label}</div>
        <div class="bar-track"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
        <div class="bar-count">${n}</div>
      </div>`;
  }).join('') || '<div class="empty-panel">Sin datos.</div>';
}

/* ── Sparkline 14 días ── */
function renderSparkline(logs, since14) {
  const days = [];
  for (let i = 13; i >= 0; i--) days.push(daysAgo(i));

  const counts = {};
  days.forEach(d => counts[d] = 0);
  logs.forEach(l => {
    const d = (l.created_at || '').slice(0, 10);
    if (counts[d] !== undefined) counts[d]++;
  });

  const vals = days.map(d => counts[d]);
  const max  = Math.max(...vals, 1);

  if (vals.every(v => v === 0)) {
    document.getElementById('spark-wrap').innerHTML = '<div class="empty-panel">Sin actividad en los últimos 14 días.</div>';
    return;
  }

  const bars = days.map((d, i) => {
    const h   = Math.max(Math.round((vals[i] / max) * 54), vals[i] > 0 ? 4 : 2);
    const day = d.slice(8); // dd
    return `
      <div class="spark-col" title="${d}: ${vals[i]} mensaje${vals[i]!==1?'s':''}">
        <div class="spark-bar" style="height:${h}px"></div>
        <div class="spark-day">${day}</div>
      </div>`;
  }).join('');

  document.getElementById('spark-wrap').innerHTML =
    `<div class="spark-row">${bars}</div>`;
}

/* ── Asesor table ── */
function renderAsesorTable(logs, feedback, metas) {
  if (!metas.length) {
    document.getElementById('asesor-wrap').innerHTML = '<div class="empty-panel">Sin asesores en la tabla metas.</div>';
    return;
  }

  const asesores = [...new Set(metas.map(m => m.asesor))];

  const rows = asesores.map(asesor => {
    const aLogs = logs.filter(l => l.asesor === asesor);
    const aFb   = feedback.filter(f => f.asesor === asesor);
    const scores = aFb.map(f => f.score).filter(s => s != null);
    const avg    = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : null;
    const last   = aLogs[0]?.created_at;
    const meta   = metas.find(m => m.asesor === asesor);
    const p      = meta?.perfil_conductual
      ? Object.entries(meta.perfil_conductual).sort((a,b)=>b[1]-a[1])[0][0]
      : null;

    const pipClass  = p ? `pip-${p.toLowerCase()}` : 'pip-x';
    const scoreHtml = avg === null
      ? '<span class="score-pill score-neu">—</span>'
      : +avg > 0
        ? `<span class="score-pill score-pos">+${avg}</span>`
        : `<span class="score-pill score-neg">${avg}</span>`;

    return `
      <tr>
        <td><span class="perfil-pip ${pipClass}">${p || '?'}</span></td>
        <td style="padding-left:10px">${asesor}</td>
        <td style="text-align:center">${aLogs.length}</td>
        <td style="text-align:center">${scoreHtml}</td>
        <td style="text-align:right;color:rgba(255,255,255,0.35);font-size:12px">${last ? fmtDate(last) : '—'}</td>
      </tr>`;
  }).join('');

  document.getElementById('asesor-wrap').innerHTML = `
    <table class="asesor-table">
      <thead>
        <tr>
          <th style="width:28px"></th>
          <th>Asesor</th>
          <th style="text-align:center">Mensajes</th>
          <th style="text-align:center">Feedback</th>
          <th style="text-align:right">Último mensaje</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ── Recent log ── */
function renderRecentLog(logs, triggers) {
  if (!logs.length) {
    document.getElementById('log-wrap').innerHTML = '<div class="empty-panel">Sin mensajes enviados aún.</div>';
    return;
  }

  document.getElementById('log-wrap').innerHTML = logs.map(l => {
    const trig  = triggers.find(t => t.id === l.trigger_id);
    const tName = trig?.nombre || l.trigger_id || '—';
    const body  = (l.body || '').slice(0, 120);
    return `
      <div class="log-item">
        <div class="log-dot"></div>
        <div class="log-meta">
          <div class="log-asesor">${l.asesor}</div>
          <div class="log-trigger">${tName} · v${l.prompt_version || '?'}</div>
          <div class="log-body">${body}${(l.body||'').length > 120 ? '…' : ''}</div>
        </div>
        <div class="log-time">${fmtDate(l.created_at)}</div>
      </div>`;
  }).join('');
}

/* ── Init ── */
loadAll();
</script>
</body>
</html>
