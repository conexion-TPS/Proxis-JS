name: CI — typecheck & build

# Gate de calidad: cada push a main y cada PR debe compilar (tsc) y buildear (next build).
# Ataja la categoría "el build falla en silencio y Vercel sirve el bundle viejo":
# si esto sale rojo, NO confíes en el deploy.
on:
  push:
    branches: [main]
  pull_request:

# Si llega un push nuevo al mismo ref, cancela la corrida anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + next build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm install (no npm ci): el package-lock.json se genera en Windows y queda
      # incompleto para Linux (faltan sub-deps opcionales de sharp: @emnapi/*), lo que
      # hace fallar a `npm ci` (estricto) en el runner ubuntu. `npm install` resuelve el
      # árbol correcto de la plataforma — igual que hace Vercel con este mismo lock.
      - name: Install deps (npm install)
        run: npm install --no-audit --no-fund

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (next build)
        run: npm run build
        env:
          # Placeholders inofensivos: el gate verifica que COMPILA y BUILDEA, no necesita
          # credenciales reales (las rutas leen las env en runtime, no en build).
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
          NEXT_TELEMETRY_DISABLED: "1"
